# Python Test Configuration
[pytest]
pythonpath = lambda/config-rules-combined
testpaths = test/unit/lambda
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --strict-markers

# Coverage configuration
[coverage:run]
source = lambda/config-rules-combined
omit = 
    */test/*
    */tests/*
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = coverage_html_report
