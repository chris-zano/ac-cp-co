name: Test Suite

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  test:
    name: Run Tests and Generate Report
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: cdk-infra/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CDK dependencies
        working-directory: cdk-infra
        run: npm ci

      - name: Install Python test dependencies
        working-directory: cdk-infra
        run: |
          python -m pip install --upgrade pip
          pip install -r test/requirements.txt

      - name: Build TypeScript
        working-directory: cdk-infra
        run: npm run build

      - name: Run TypeScript tests with coverage
        working-directory: cdk-infra
        run: npm run test:coverage

      - name: Run Python tests with coverage
        working-directory: cdk-infra
        run: npm run test:python:coverage

      - name: Generate test summary
        if: always()
        working-directory: cdk-infra
        run: |
          echo "# Test Results Summary" > test-summary.md
          echo "" >> test-summary.md
          echo "## Workflow Information" >> test-summary.md
          echo "- **Run Number**: ${{ github.run_number }}" >> test-summary.md
          echo "- **Commit**: ${{ github.sha }}" >> test-summary.md
          echo "- **Branch**: ${{ github.ref_name }}" >> test-summary.md
          echo "- **Date**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> test-summary.md
          echo "" >> test-summary.md
          echo "## Test Coverage" >> test-summary.md
          echo "" >> test-summary.md
          echo "### TypeScript Coverage" >> test-summary.md
          echo '```' >> test-summary.md
          cat coverage/lcov.info | grep -E "^(LF|LH):" | head -2 || echo "Coverage data not available" >> test-summary.md
          echo '```' >> test-summary.md
          echo "" >> test-summary.md
          echo "### Python Coverage" >> test-summary.md
          echo '```' >> test-summary.md
          if [ -f htmlcov/index.html ]; then
            grep -oP '(?<=<span class="pc_cov">)[^<]+' htmlcov/index.html | head -1 || echo "Coverage data not available"
          else
            echo "Coverage report not generated"
          fi >> test-summary.md
          echo '```' >> test-summary.md
          echo "" >> test-summary.md
          echo "## Artifacts" >> test-summary.md
          echo "- TypeScript coverage: \`coverage/\`" >> test-summary.md
          echo "- Python coverage: \`htmlcov/\`" >> test-summary.md

      - name: Upload TypeScript coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typescript-coverage-report
          path: cdk-infra/coverage/
          retention-days: 30

      - name: Upload Python coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-report
          path: cdk-infra/htmlcov/
          retention-days: 30

      - name: Upload test summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-summary
          path: cdk-infra/test-summary.md
          retention-days: 30

      - name: Create Test Report Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          cd cdk-infra
          tar -czf typescript-coverage.tar.gz coverage/
          tar -czf python-coverage.tar.gz htmlcov/
          gh release create test-report-${{ github.run_number }} \
            --title "Test Report - Build ${{ github.run_number }}" \
            --notes-file test-summary.md \
            typescript-coverage.tar.gz \
            python-coverage.tar.gz \
            test-summary.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
